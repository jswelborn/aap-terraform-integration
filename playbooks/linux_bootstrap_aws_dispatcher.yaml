---
- name: Launch an isolated AWS Linux bootstrap workflow
  hosts: localhost
  gather_facts: false

  vars:
    controller_host: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') | trim }}"
    controller_username: "{{ lookup('ansible.builtin.env', 'CONTROLLER_USERNAME') | trim }}"
    controller_password: "{{ lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') | trim }}"

    controller_organization: "HTS SRE"

    aws_source_workflow_name: "Linux-bootstrap-aws"

    aws_dynamic_credential_job_templates:
      - "Linux-postbuild-aws"
      - "Linux-identity-aws"

    aws_bootstrap_limit: "{{ aws_bootstrap_hosts | join(',') }}"

    aws_temporary_workflow_target: >-
      {{
        (
          aws_bootstrap_hosts | first
        )
        if aws_bootstrap_hosts | length == 1
        else
        (
          (aws_bootstrap_hosts | length | string)
          ~ '-hosts'
        )
      }}

    aws_temporary_workflow_name: >-
      {{
        aws_source_workflow_name
        ~ '-temporary-'
        ~ (
            tower_job_id
            | default(ansible_job_id | default('manual'), true)
            | string
            | regex_replace('[^A-Za-z0-9_-]', '-')
          )
        ~ '-'
        ~ (
            aws_temporary_workflow_target
            | lower
            | regex_replace('[^a-z0-9_-]', '-')
          )
      }}

  tasks:
    - name: Validate dispatcher inputs
      ansible.builtin.assert:
        that:
          - aws_bootstrap_hosts is defined
          - aws_bootstrap_hosts is sequence
          - aws_bootstrap_hosts is not string
          - aws_bootstrap_hosts | length > 0
          - aws_machine_credential_name is defined
          - aws_machine_credential_name | string | trim | length > 0
        fail_msg: >-
          The dispatcher requires a non-empty aws_bootstrap_hosts list
          and aws_machine_credential_name.

    - name: Validate Controller connection variables
      ansible.builtin.assert:
        that:
          - controller_host | length > 0
          - controller_username | length > 0
          - controller_password | length > 0
        fail_msg: >-
          CONTROLLER_HOST, CONTROLLER_USERNAME, and CONTROLLER_PASSWORD
          must be supplied by the attached AAP Controller credential.
      no_log: true

    - name: Show temporary workflow selection
      ansible.builtin.debug:
        msg:
          source_workflow: "{{ aws_source_workflow_name }}"
          temporary_workflow: "{{ aws_temporary_workflow_name }}"
          target_hosts: "{{ aws_bootstrap_hosts }}"
          limit: "{{ aws_bootstrap_limit }}"
          terraform_machine_credential: "{{ aws_machine_credential_name }}"
          dynamically_updated_nodes: "{{ aws_dynamic_credential_job_templates }}"

    - name: Create and launch isolated AWS Linux workflow
      block:
        #######################################################################
        # Locate the Terraform-selected Machine credential
        #######################################################################

        - name: Get selected AAP Machine credential
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/credentials/'
                ~ '?name='
                ~ (aws_machine_credential_name | urlencode)
                ~ '&credential_type__kind=ssh'
                ~ '&organization__name='
                ~ (controller_organization | urlencode)
                ~ '&page_size=2'
              }}
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            return_content: true
            status_code: 200
          register: aws_machine_credential_result
          no_log: true

        - name: Validate selected AAP Machine credential
          ansible.builtin.assert:
            that:
              - aws_machine_credential_result.json.count == 1
            fail_msg: >-
              Expected exactly one AAP Machine credential named
              {{ aws_machine_credential_name }} in organization
              {{ controller_organization }}, but Controller returned
              {{ aws_machine_credential_result.json.count }}.

        - name: Set selected AAP Machine credential
          ansible.builtin.set_fact:
            aws_machine_credential: >-
              {{
                aws_machine_credential_result.json.results[0]
              }}

        #######################################################################
        # Locate the permanent workflow
        #######################################################################

        - name: Get permanent AWS Linux bootstrap workflow
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_templates/'
                ~ '?name='
                ~ (aws_source_workflow_name | urlencode)
                ~ '&organization__name='
                ~ (controller_organization | urlencode)
                ~ '&page_size=2'
              }}
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            return_content: true
            status_code: 200
          register: aws_source_workflow_result
          no_log: true

        - name: Validate permanent workflow lookup
          ansible.builtin.assert:
            that:
              - aws_source_workflow_result.json.count == 1
            fail_msg: >-
              Expected exactly one workflow named
              {{ aws_source_workflow_name }} in organization
              {{ controller_organization }}, but Controller returned
              {{ aws_source_workflow_result.json.count }}.

        - name: Set permanent workflow ID
          ansible.builtin.set_fact:
            aws_source_workflow_id: >-
              {{
                aws_source_workflow_result.json.results[0].id
              }}

        #######################################################################
        # Remove any stale copy with the same temporary name
        #######################################################################

        - name: Check whether temporary workflow already exists
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_templates/'
                ~ '?name='
                ~ (aws_temporary_workflow_name | urlencode)
                ~ '&organization__name='
                ~ (controller_organization | urlencode)
                ~ '&page_size=2'
              }}
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            return_content: true
            status_code: 200
          register: existing_temporary_workflow_result
          no_log: true

        - name: Fail if multiple stale temporary workflows were found
          ansible.builtin.fail:
            msg: >-
              Multiple workflows named {{ aws_temporary_workflow_name }}
              were found. Remove the duplicates before retrying.
          when:
            - existing_temporary_workflow_result.json.count | int > 1

        - name: Delete stale temporary workflow from a previous failed run
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_templates/'
                ~ (
                    existing_temporary_workflow_result.json.results[0].id
                    | string
                  )
                ~ '/'
              }}
            method: DELETE
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            status_code:
              - 202
              - 204
          when:
            - existing_temporary_workflow_result.json.count | int == 1
          no_log: true

        #######################################################################
        # Copy the permanent workflow
        #######################################################################

        - name: Copy permanent AWS Linux bootstrap workflow
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_templates/'
                ~ (aws_source_workflow_id | string)
                ~ '/copy/'
              }}
            method: POST
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            body_format: json
            body:
              name: "{{ aws_temporary_workflow_name }}"
              description: |-
                Temporary workflow copied from {{ aws_source_workflow_name }}.

                Hosts:
                {{ aws_bootstrap_hosts | join(', ') }}

                Initial Machine credential:
                {{ aws_machine_credential_name }}

                Dispatcher job:
                {{ tower_job_id | default('manual') }}
            return_content: true
            status_code: 201
          register: aws_temporary_workflow_copy_result
          no_log: true

        - name: Set temporary workflow ID
          ansible.builtin.set_fact:
            aws_temporary_workflow_id: >-
              {{
                aws_temporary_workflow_copy_result.json.id
              }}

        - name: Validate temporary workflow copy response
          ansible.builtin.assert:
            that:
              - aws_temporary_workflow_id is defined
              - aws_temporary_workflow_id | int > 0
            fail_msg: >-
              Controller did not return a valid workflow ID after
              copying {{ aws_source_workflow_name }}.

        #######################################################################
        # Read the copied workflow graph
        #######################################################################

        - name: Get copied workflow nodes
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_template_nodes/'
                ~ '?workflow_job_template='
                ~ (aws_temporary_workflow_id | string)
                ~ '&page_size=200'
              }}
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            return_content: true
            status_code: 200
          register: aws_temporary_workflow_nodes_result
          no_log: true

        - name: Validate copied workflow contains nodes
          ansible.builtin.assert:
            that:
              - aws_temporary_workflow_nodes_result.json.count | int > 0
            fail_msg: >-
              The copied workflow {{ aws_temporary_workflow_name }}
              does not contain any workflow nodes.

        #######################################################################
        # Select only Linux-postbuild-aws and Linux-identity-aws
        #######################################################################

        - name: Initialize dynamic credential workflow nodes
          ansible.builtin.set_fact:
            aws_dynamic_credential_nodes: []

        - name: Select copied postbuild and identity nodes
          ansible.builtin.set_fact:
            aws_dynamic_credential_nodes: >-
              {{
                aws_dynamic_credential_nodes
                +
                [
                  {
                    'node_id': item.id,
                    'node_identifier': (
                      item.identifier
                      | default(item.id | string)
                    ),
                    'job_template_id': (
                      item.summary_fields.unified_job_template.id
                    ),
                    'job_template_name': (
                      item.summary_fields.unified_job_template.name
                    )
                  }
                ]
              }}
          loop: "{{ aws_temporary_workflow_nodes_result.json.results }}"
          loop_control:
            label: >-
              {{
                item.summary_fields.unified_job_template.name
                | default(item.identifier | default(item.id))
              }}
          when:
            - item.summary_fields is defined
            - item.summary_fields.unified_job_template is defined
            - item.summary_fields.unified_job_template.name is defined
            - >-
              item.summary_fields.unified_job_template.name
              in aws_dynamic_credential_job_templates

        - name: Validate copied postbuild and identity nodes
          ansible.builtin.assert:
            that:
              - aws_dynamic_credential_nodes | length == 2
              - >-
                aws_dynamic_credential_nodes
                | selectattr(
                    'job_template_name',
                    'equalto',
                    'Linux-postbuild-aws'
                  )
                | list
                | length == 1
              - >-
                aws_dynamic_credential_nodes
                | selectattr(
                    'job_template_name',
                    'equalto',
                    'Linux-identity-aws'
                  )
                | list
                | length == 1
            fail_msg: >-
              The copied workflow must contain exactly one
              Linux-postbuild-aws node and exactly one
              Linux-identity-aws node. Found:
              {{
                aws_dynamic_credential_nodes
                | map(attribute='job_template_name')
                | list
              }}.

        #######################################################################
        # Read current credentials from the copied dynamic nodes
        #######################################################################

        - name: Get credentials assigned to copied dynamic nodes
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_template_nodes/'
                ~ (item.node_id | string)
                ~ '/credentials/?page_size=200'
              }}
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            return_content: true
            status_code: 200
          loop: "{{ aws_dynamic_credential_nodes }}"
          loop_control:
            label: "{{ item.job_template_name }}"
          register: aws_dynamic_node_credentials
          no_log: true

        #######################################################################
        # Remove any existing Machine credential from those copied nodes
        #######################################################################

        - name: Remove existing Machine credentials from copied nodes
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_template_nodes/'
                ~ (item.0.item.node_id | string)
                ~ '/credentials/'
              }}
            method: POST
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            body_format: json
            body:
              id: "{{ item.1.id | int }}"
              disassociate: true
            status_code:
              - 200
              - 201
              - 204
          loop: >-
            {{
              aws_dynamic_node_credentials.results
              | subelements('json.results', skip_missing=True)
            }}
          loop_control:
            label: >-
              {{
                item.0.item.job_template_name
                ~ ' -> '
                ~ item.1.name
              }}
          no_log: true
          when:
            - item.1.summary_fields is defined
            - item.1.summary_fields.credential_type is defined
            - item.1.summary_fields.credential_type.kind == "ssh"

        #######################################################################
        # Assign the selected Terraform Machine credential to those two nodes
        #######################################################################

        - name: Assign Terraform Machine credential to copied nodes
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_template_nodes/'
                ~ (item.node_id | string)
                ~ '/credentials/'
              }}
            method: POST
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            body_format: json
            body:
              id: "{{ aws_machine_credential.id | int }}"
            return_content: true
            status_code:
              - 200
              - 201
              - 204
          loop: "{{ aws_dynamic_credential_nodes }}"
          loop_control:
            label: >-
              {{
                item.job_template_name
                ~ ' -> '
                ~ aws_machine_credential_name
              }}
          register: aws_machine_credential_assignments

        #######################################################################
        # Confirm the copied nodes received the selected Machine credential
        #######################################################################

        - name: Read updated credentials from copied nodes
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_template_nodes/'
                ~ (item.node_id | string)
                ~ '/credentials/?page_size=200'
              }}
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            return_content: true
            status_code: 200
          loop: "{{ aws_dynamic_credential_nodes }}"
          loop_control:
            label: "{{ item.job_template_name }}"
          register: aws_updated_node_credentials
          no_log: true

        - name: Validate Terraform credential assignment on copied nodes
          ansible.builtin.assert:
            that:
              - >-
                item.json.results
                | selectattr(
                    'id',
                    'equalto',
                    aws_machine_credential.id
                  )
                | list
                | length == 1
            fail_msg: >-
              The copied {{ item.item.job_template_name }} node did not
              receive Machine credential {{ aws_machine_credential_name }}.
            success_msg: >-
              The copied {{ item.item.job_template_name }} node received
              Machine credential {{ aws_machine_credential_name }}.
          loop: "{{ aws_updated_node_credentials.results }}"
          loop_control:
            label: "{{ item.item.job_template_name }}"

        #######################################################################
        # Launch the isolated copied workflow
        #######################################################################

        - name: Launch temporary AWS Linux bootstrap workflow
          ansible.controller.workflow_launch:
            workflow_template: "{{ aws_temporary_workflow_name }}"
            organization: "{{ controller_organization }}"
            limit: "{{ aws_bootstrap_limit }}"
            wait: true
            request_timeout: 30
          register: aws_temporary_workflow_launch

        - name: Show successful temporary workflow completion
          ansible.builtin.debug:
            msg:
              workflow: "{{ aws_temporary_workflow_name }}"
              hosts: "{{ aws_bootstrap_hosts }}"
              initial_machine_credential: "{{ aws_machine_credential_name }}"
              result: "AWS Linux bootstrap completed successfully"

      always:
        #######################################################################
        # Always remove the temporary workflow
        #######################################################################

        - name: Delete temporary AWS Linux bootstrap workflow
          ansible.builtin.uri:
            url: >-
              {{
                controller_host
                ~ '/api/controller/v2/workflow_job_templates/'
                ~ (aws_temporary_workflow_id | string)
                ~ '/'
              }}
            method: DELETE
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: false
            status_code:
              - 202
              - 204
          when:
            - aws_temporary_workflow_id is defined
          no_log: true