---
- name: Launch Terraform Cloud VM Post Apply job
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    aap_controller_url: "https://platform.cus-xpgr22.aws.ansiblecloud.redhat.com"
    job_template_id: 54

  tasks:
    - name: Launch job template via API
      ansible.builtin.uri:
        url: "{{ aap_controller_url }}/api/controller/v2/job_templates/{{ job_template_id }}/launch/"
        method: POST
        headers:
          Authorization: "Bearer {{ AAP_TOKEN }}"
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          extra_vars:
            plan_json_api_url: "{{ event_payload.plan_json_api_url }}"
            task_result_callback_url: "{{ event_payload.task_result_callback_url }}"
            access_token: "{{ event_payload.access_token }}"
            run_id: "{{ event_payload.run_id }}"
        status_code:
          - 201
          - 202
        return_content: true
      register: launch_result

    - name: Show launch response
      ansible.builtin.debug:
        var: launch_result.json