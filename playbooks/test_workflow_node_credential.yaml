---
- name: Test AAP workflow-node credential association
  hosts: localhost
  gather_facts: false

  vars:
    controller_host: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') | trim }}"
    controller_username: "{{ lookup('ansible.builtin.env', 'CONTROLLER_USERNAME') | trim }}"
    controller_password: "{{ lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') | trim }}"

    # Replace this with the node ID from the successful browser request.
    test_workflow_node_id: 108

    # Credential used in your successful browser capture.
    test_credential_id: 88

  tasks:
    - name: Validate test inputs
      ansible.builtin.assert:
        that:
          - controller_host | length > 0
          - controller_username | length > 0
          - controller_password | length > 0
          - test_workflow_node_id | int > 0
          - test_credential_id | int > 0
      no_log: true

    - name: Associate credential using curl
      ansible.builtin.command:
        argv:
          - curl
          - --silent
          - --show-error
          - --output
          - /tmp/workflow-node-credential-response.txt
          - --write-out
          - "%{http_code}"
          - --request
          - POST
          - --user
          - "{{ controller_username }}:{{ controller_password }}"
          - --header
          - "Content-Type: application/json"
          - --data-binary
          - '{"id":88}'
          - "{{ controller_host }}/api/controller/v2/workflow_job_template_nodes/108/credentials/"
      register: credential_association
      changed_when: credential_association.stdout == "204"
      failed_when: credential_association.stdout not in ["200", "201", "204"]
      no_log: true

    - name: Show association HTTP status
      ansible.builtin.debug:
        msg: "Credential association returned HTTP {{ credential_association.stdout }}"

    - name: Read workflow-node credentials
      ansible.builtin.uri:
        url: >-
          {{
            controller_host
            ~ '/api/controller/v2/workflow_job_template_nodes/'
            ~ (test_workflow_node_id | string)
            ~ '/credentials/?page_size=200'
          }}
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
        status_code: 200
      register: workflow_node_credentials
      no_log: true

    - name: Verify credential is assigned
      ansible.builtin.assert:
        that:
          - >-
            workflow_node_credentials.json.results
            | selectattr('id', 'equalto', test_credential_id)
            | list
            | length == 1
        success_msg: >-
          Credential {{ test_credential_id }} was successfully assigned
          to workflow node {{ test_workflow_node_id }}.
        fail_msg: >-
          Credential {{ test_credential_id }} was not assigned to
          workflow node {{ test_workflow_node_id }}.