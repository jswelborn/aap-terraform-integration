---
- name: Test workflow node credential association
  hosts: localhost
  gather_facts: false

  vars:
    controller_host: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') | trim }}"
    controller_username: "{{ lookup('ansible.builtin.env', 'CONTROLLER_USERNAME') | trim }}"
    controller_password: "{{ lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') | trim }}"

    # Replace these before running.
    test_workflow_node_id: 108
    test_credential_id: 81

  tasks:
    - name: Validate Controller connection variables
      ansible.builtin.assert:
        that:
          - controller_host | length > 0
          - controller_username | length > 0
          - controller_password | length > 0
      no_log: true

    - name: Show test inputs
      ansible.builtin.debug:
        msg:
          workflow_node_id: "{{ test_workflow_node_id }}"
          workflow_node_id_type: "{{ test_workflow_node_id | type_debug }}"
          credential_id: "{{ test_credential_id }}"
          credential_id_type: "{{ test_credential_id | type_debug }}"

    - name: Associate Machine credential using exact UI payload
      ansible.builtin.command:
        argv:
          - curl
          - --silent
          - --show-error
          - --fail-with-body
          - --request
          - POST
          - --user
          - "{{ controller_username }}:{{ controller_password }}"
          - --header
          - "Content-Type: application/json"
          - --data-binary
          - '{"id":81}'
          - "{{ controller_host }}/api/controller/v2/workflow_job_template_nodes/108/credentials/"
      register: credential_association
      changed_when: credential_association.rc == 0
      no_log: true

    - name: Read credentials assigned to workflow node
      ansible.builtin.uri:
        url: >-
          {{
            controller_host
            ~ '/api/controller/v2/workflow_job_template_nodes/'
            ~ (test_workflow_node_id | string)
            ~ '/credentials/?page_size=200'
          }}
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
        status_code: 200
      register: workflow_node_credentials
      no_log: true

    - name: Verify credential association
      ansible.builtin.assert:
        that:
          - >-
            workflow_node_credentials.json.results
            | selectattr('id', 'equalto', test_credential_id)
            | list
            | length == 1
        fail_msg: >-
          Credential {{ test_credential_id }} was not associated with
          workflow node {{ test_workflow_node_id }}.
        success_msg: >-
          Credential {{ test_credential_id }} was successfully associated
          with workflow node {{ test_workflow_node_id }}.