---
- name: Process Terraform post-apply and launch bootstrap workflows
  hosts: localhost
  gather_facts: false

  vars:
    controller_host: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') | trim }}"
    controller_username: "{{ lookup('ansible.builtin.env', 'CONTROLLER_USERNAME') | trim }}"
    controller_password: "{{ lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') | trim }}"

  tasks:
    - name: Get JSON plan information by run ID
      hashicorp.terraform.view_plan:
        run_id: "{{ run_id }}"
        tf_token: "{{ hcpterraform_api_token }}"
        output_format: json
      register: planresults
      until: planresults.json_output.complete
      retries: 30
      delay: 10
      no_log: true

    - name: Initialize VM routing lists
      ansible.builtin.set_fact:
        azure_linux_vms: []
        azure_windows_vms: []
        aws_instance_names: []
        aws_linux_instances: []
        aws_windows_instances: []
        matched_azure_inventory_sources: []
        matched_aws_inventory_sources: []

    - name: Set AWS region from Terraform outputs
      ansible.builtin.set_fact:
        aws_region: "{{ planresults.json_output.planned_values.outputs.aws_region.value }}"
      when:
        - planresults.json_output.planned_values.outputs.aws_region is defined

    - name: Find newly created Azure Linux VMs
      ansible.builtin.set_fact:
        azure_linux_vms: "{{ azure_linux_vms + [item.change.after.name] }}"
      loop: "{{ planresults.json_output.resource_changes }}"
      when:
        - item.type == "azurerm_linux_virtual_machine"
        - "'create' in item.change.actions"
        - item.change.after.name is defined

    - name: Find newly created Azure Windows VMs
      ansible.builtin.set_fact:
        azure_windows_vms: "{{ azure_windows_vms + [item.change.after.name] }}"
      loop: "{{ planresults.json_output.resource_changes }}"
      when:
        - item.type == "azurerm_windows_virtual_machine"
        - "'create' in item.change.actions"
        - item.change.after.name is defined

    - name: Extract Azure subscription ID from Azure resource IDs
      ansible.builtin.set_fact:
        azure_subscription_id: >-
          {{
            (
              planresults.json_output.resource_changes
              | selectattr('provider_name', 'equalto', 'registry.terraform.io/hashicorp/azurerm')
              | map(attribute='change.after')
              | map('to_json')
              | join(' ')
              | regex_search('/subscriptions/([0-9a-fA-F-]{36})', '\1')
            ) | first
          }}
      when:
        - (azure_linux_vms | length > 0) or (azure_windows_vms | length > 0)

    - name: Get Azure inventory sources from controller
      ansible.builtin.uri:
        url: "{{ controller_host }}/api/controller/v2/inventory_sources/?source=azure_rm&page_size=200"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: azure_inventory_sources_result
      no_log: true
      when:
        - azure_subscription_id is defined

    - name: Match Azure inventory source by aap_subscription_id
      ansible.builtin.set_fact:
        matched_azure_inventory_sources: >-
          {{
            azure_inventory_sources_result.json.results
            | selectattr('source_vars', 'search', 'aap_subscription_id: ' ~ azure_subscription_id)
            | list
          }}
      when:
        - azure_subscription_id is defined
        - azure_inventory_sources_result.json.results is defined

    - name: Show extracted Azure subscription ID
      ansible.builtin.debug:
        var: azure_subscription_id
      when:
        - azure_subscription_id is defined

    - name: Show matched Azure inventory source names
      ansible.builtin.debug:
        msg: "{{ matched_azure_inventory_sources | map(attribute='name') | list }}"
      when:
        - azure_subscription_id is defined

    - name: Fail if no matching Azure inventory source was found
      ansible.builtin.fail:
        msg: >-
          No Azure inventory source found with aap_subscription_id={{ azure_subscription_id }}.
          Add aap_subscription_id to the matching Azure inventory source variables.
      when:
        - azure_subscription_id is defined
        - matched_azure_inventory_sources | length == 0

    - name: Sync matching Azure inventory source before bootstrap
      ansible.controller.inventory_source_update:
        name: "{{ item.name }}"
        inventory: "{{ item.summary_fields.inventory.name }}"
        organization: "{{ item.summary_fields.organization.name }}"
        wait: true
        request_timeout: 30
      loop: "{{ matched_azure_inventory_sources }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - matched_azure_inventory_sources | length > 0

    - name: Find newly created AWS instances
      ansible.builtin.set_fact:
        aws_instance_names: "{{ aws_instance_names + [item.change.after.tags.Name] }}"
      loop: "{{ planresults.json_output.resource_changes }}"
      when:
        - item.type == "aws_instance"
        - "'create' in item.change.actions"
        - item.change.after.tags.Name is defined

    - name: Find AWS account ID candidates from Terraform plan
      ansible.builtin.set_fact:
        aws_account_id_candidates: >-
          {{
            (
              planresults.json_output
              | to_json
              | regex_findall('arn:aws[a-zA-Z-]*:iam::([0-9]{12}):role/')
            )
            +
            (
              planresults.json_output
              | to_json
              | regex_findall('arn:aws[a-zA-Z-]*:ec2:[^:]+:([0-9]{12}):instance/')
            )
          }}
      when:
        - aws_instance_names | length > 0

    - name: Set AWS account ID from Terraform plan
      ansible.builtin.set_fact:
        aws_account_id: "{{ aws_account_id_candidates | unique | first }}"
      when:
        - aws_instance_names | length > 0
        - aws_account_id_candidates is defined
        - aws_account_id_candidates | length > 0

    - name: Fail if AWS account ID could not be determined
      ansible.builtin.fail:
        msg: >-
          AWS instances were created, but the AWS account ID could not be extracted
          from Terraform plan output. Expected an IAM role ARN like
          arn:aws:iam::123456789012:role/name or an EC2 ARN.
      when:
        - aws_instance_names | length > 0
        - aws_account_id is not defined

    - name: Get AWS inventory sources from controller
      ansible.builtin.uri:
        url: "{{ controller_host }}/api/controller/v2/inventory_sources/?source=ec2&page_size=200"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: aws_inventory_sources_result
      no_log: true
      when:
        - aws_instance_names | length > 0
        - aws_account_id is defined

    - name: Match AWS inventory source by AWS account ID in source vars
      ansible.builtin.set_fact:
        matched_aws_inventory_sources: >-
          {{
            aws_inventory_sources_result.json.results
            | selectattr('source_vars', 'search', aws_account_id)
            | list
          }}
      when:
        - aws_instance_names | length > 0
        - aws_account_id is defined
        - aws_inventory_sources_result.json.results is defined

    - name: Show extracted AWS account ID
      ansible.builtin.debug:
        var: aws_account_id
      when:
        - aws_instance_names | length > 0
        - aws_account_id is defined

    - name: Show matched AWS inventory source names
      ansible.builtin.debug:
        msg: "{{ matched_aws_inventory_sources | map(attribute='name') | list }}"
      when:
        - aws_instance_names | length > 0

    - name: Fail if no matching AWS inventory source was found
      ansible.builtin.fail:
        msg: >-
          No AWS inventory source found with AWS account ID {{ aws_account_id }}
          in source_vars.
      when:
        - aws_instance_names | length > 0
        - aws_account_id is defined
        - matched_aws_inventory_sources | length == 0

    - name: Sync matching AWS inventory source before bootstrap
      ansible.controller.inventory_source_update:
        name: "{{ item.name }}"
        inventory: "{{ item.summary_fields.inventory.name }}"
        organization: "{{ item.summary_fields.organization.name }}"
        wait: true
        request_timeout: 30
      loop: "{{ matched_aws_inventory_sources }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - matched_aws_inventory_sources | length > 0

    - name: Set AWS inventory assume role ARN
      ansible.builtin.set_fact:
        aws_assume_role_arn: >-
          {{
            matched_aws_inventory_sources[0].source_vars
            | regex_search('arn:aws:iam::' ~ aws_account_id ~ ':role/[^\\s\\n\\r]+')
          }}
      when:
        - matched_aws_inventory_sources | length > 0
        - aws_account_id is defined

    - name: Assume AWS inventory role for metadata lookup
      amazon.aws.sts_assume_role:
        role_arn: "{{ aws_assume_role_arn }}"
        role_session_name: "aap-terraform-post-apply"
      register: aws_assumed_role
      when:
        - aws_instance_names | length > 0
        - aws_assume_role_arn is defined

    - name: Gather AWS instance metadata
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        access_key: "{{ aws_assumed_role.sts_creds.access_key }}"
        secret_key: "{{ aws_assumed_role.sts_creds.secret_key }}"
        session_token: "{{ aws_assumed_role.sts_creds.session_token }}"
        filters:
          "tag:Name": "{{ item }}"
      loop: "{{ aws_instance_names }}"
      register: aws_instance_info
      when:
        - aws_instance_names | length > 0
        - aws_region is defined
        - aws_assumed_role.sts_creds is defined

    - name: Route AWS Windows instances
      ansible.builtin.set_fact:
        aws_windows_instances: "{{ aws_windows_instances + [item.item] }}"
      loop: "{{ aws_instance_info.results | default([]) }}"
      when:
        - item.instances is defined
        - item.instances | length > 0
        - >
          'windows' in (
            item.instances[0].platform_details | default('')
          ) | lower

    - name: Route AWS Linux instances
      ansible.builtin.set_fact:
        aws_linux_instances: "{{ aws_linux_instances + [item.item] }}"
      loop: "{{ aws_instance_info.results | default([]) }}"
      when:
        - item.instances is defined
        - item.instances | length > 0
        - >
          'windows' not in (
            item.instances[0].platform_details | default('')
          ) | lower

    - name: Show routing results
      ansible.builtin.debug:
        msg:
          azure_subscription_id: "{{ azure_subscription_id | default('N/A') }}"
          matched_azure_inventory_sources: "{{ matched_azure_inventory_sources | map(attribute='name') | list }}"
          azure_linux_vms: "{{ azure_linux_vms }}"
          azure_windows_vms: "{{ azure_windows_vms }}"
          aws_account_id: "{{ aws_account_id | default('N/A') }}"
          matched_aws_inventory_sources: "{{ matched_aws_inventory_sources | map(attribute='name') | list }}"
          aws_assume_role_arn: "{{ aws_assume_role_arn | default('N/A') }}"
          aws_linux_instances: "{{ aws_linux_instances }}"
          aws_windows_instances: "{{ aws_windows_instances }}"

    - name: Launch Azure Linux bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Linux-bootstrap-azure"
        limit: "{{ azure_linux_vms | join(',') }}"
        extra_vars:
          vm_name: "{{ azure_linux_vms | join(',') }}"
          cloud_provider: "azure"
          operating_system: "linux"
        wait: true
        request_timeout: 30
      when: azure_linux_vms | length > 0

    - name: Launch Azure Windows bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Windows-bootstrap-azure"
        limit: "{{ azure_windows_vms | join(',') }}"
        extra_vars:
          vm_name: "{{ azure_windows_vms | join(',') }}"
          cloud_provider: "azure"
          operating_system: "windows"
        wait: true
        request_timeout: 30
      when: azure_windows_vms | length > 0

    - name: Launch AWS Linux bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Linux-bootstrap-aws"
        limit: "{{ aws_linux_instances | join(',') }}"
        extra_vars:
          vm_name: "{{ aws_linux_instances | join(',') }}"
          cloud_provider: "aws"
          operating_system: "linux"
        wait: true
        request_timeout: 30
      when: aws_linux_instances | length > 0

    - name: Launch AWS Windows bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Windows-bootstrap-aws"
        limit: "{{ aws_windows_instances | join(',') }}"
        extra_vars:
          vm_name: "{{ aws_windows_instances | join(',') }}"
          cloud_provider: "aws"
          operating_system: "windows"
        wait: true
        request_timeout: 30
      when: aws_windows_instances | length > 0