---
- name: Process Terraform post-apply and launch bootstrap workflows
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get JSON plan information by run ID
      hashicorp.terraform.view_plan:
        run_id: "{{ run_id }}"
        tf_token: "{{ hcpterraform_api_token }}"
        output_format: json
      register: planresults
      until: planresults.json_output.complete
      retries: 30
      delay: 10

    - name: Find newly created Azure Linux VMs
      ansible.builtin.set_fact:
        azure_linux_vms: >-
          {{
            planresults.json_output.resource_changes
            | selectattr('type', 'equalto', 'azurerm_linux_virtual_machine')
            | selectattr('change.actions', 'contains', 'create')
            | map(attribute='change.after.name')
            | list
          }}

    - name: Find newly created Azure Windows VMs
      ansible.builtin.set_fact:
        azure_windows_vms: >-
          {{
            planresults.json_output.resource_changes
            | selectattr('type', 'equalto', 'azurerm_windows_virtual_machine')
            | selectattr('change.actions', 'contains', 'create')
            | map(attribute='change.after.name')
            | list
          }}

    - name: Launch Linux bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Linux-bootstrap"
        limit: "{{ azure_linux_vms | join(',') }}"
        extra_vars:
          vm_name: "{{ azure_linux_vms | join(',') }}"
          cloud_provider: "azure"
          operating_system: "linux"
        wait: true
      when: azure_linux_vms | length > 0

    - name: Launch Windows bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Windows-bootstrap"
        limit: "{{ azure_windows_vms | join(',') }}"
        extra_vars:
          vm_name: "{{ azure_windows_vms | join(',') }}"
          cloud_provider: "azure"
          operating_system: "windows"
        wait: true
      when: azure_windows_vms | length > 0