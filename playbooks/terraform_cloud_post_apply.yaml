---
- name: Process Terraform post-apply and launch bootstrap workflows
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get JSON plan information by run ID
      hashicorp.terraform.view_plan:
        run_id: "{{ run_id }}"
        tf_token: "{{ hcpterraform_api_token }}"
        output_format: json
      register: planresults
      until: planresults.json_output.complete
      retries: 30
      delay: 10
      no_log: true

    - name: Initialize VM routing lists
      ansible.builtin.set_fact:
        azure_linux_vms: []
        azure_windows_vms: []
        aws_instance_names: []
        aws_linux_instances: []
        aws_windows_instances: []

    - name: Find newly created Azure Linux VMs
      ansible.builtin.set_fact:
        azure_linux_vms: "{{ azure_linux_vms + [item.change.after.name] }}"
      loop: "{{ planresults.json_output.resource_changes }}"
      when:
        - item.type == "azurerm_linux_virtual_machine"
        - "'create' in item.change.actions"
        - item.change.after.name is defined

    - name: Find newly created Azure Windows VMs
      ansible.builtin.set_fact:
        azure_windows_vms: "{{ azure_windows_vms + [item.change.after.name] }}"
      loop: "{{ planresults.json_output.resource_changes }}"
      when:
        - item.type == "azurerm_windows_virtual_machine"
        - "'create' in item.change.actions"
        - item.change.after.name is defined

    - name: Find newly created AWS instances
      ansible.builtin.set_fact:
        aws_instance_names: "{{ aws_instance_names + [item.change.after.tags.Name] }}"
      loop: "{{ planresults.json_output.resource_changes }}"
      when:
        - item.type == "aws_instance"
        - "'create' in item.change.actions"
        - item.change.after.tags.Name is defined

    - name: Get AWS host information from inventory
      ansible.controller.host_info:
        name: "{{ item }}"
        inventory: "AWS"
      loop: "{{ aws_instance_names }}"
      register: aws_host_info
      when: aws_instance_names | length > 0

    - name: Route AWS Windows instances
      ansible.builtin.set_fact:
        aws_windows_instances: "{{ aws_windows_instances + [item.item] }}"
      loop: "{{ aws_host_info.results | default([]) }}"
      when:
        - item.hosts is defined
        - item.hosts | length > 0
        - >
          'Windows' in (
            item.hosts[0].summary_fields.groups.results
            | default([])
            | map(attribute='name')
            | list
          )

    - name: Route AWS Linux instances
      ansible.builtin.set_fact:
        aws_linux_instances: "{{ aws_linux_instances + [item.item] }}"
      loop: "{{ aws_host_info.results | default([]) }}"
      when:
        - item.hosts is defined
        - item.hosts | length > 0
        - >
          'Linux' in (
            item.hosts[0].summary_fields.groups.results
            | default([])
            | map(attribute='name')
            | list
          )

    - name: Show routing results
      ansible.builtin.debug:
        msg:
          azure_linux_vms: "{{ azure_linux_vms }}"
          azure_windows_vms: "{{ azure_windows_vms }}"
          aws_linux_instances: "{{ aws_linux_instances }}"
          aws_windows_instances: "{{ aws_windows_instances }}"

    - name: Launch Azure Linux bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Linux-bootstrap-azure"
        limit: "{{ azure_linux_vms | join(',') }}"
        extra_vars:
          vm_name: "{{ azure_linux_vms | join(',') }}"
          cloud_provider: "azure"
          operating_system: "linux"
        wait: true
      when: azure_linux_vms | length > 0

    - name: Launch Azure Windows bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Windows-bootstrap-azure"
        limit: "{{ azure_windows_vms | join(',') }}"
        extra_vars:
          vm_name: "{{ azure_windows_vms | join(',') }}"
          cloud_provider: "azure"
          operating_system: "windows"
        wait: true
      when: azure_windows_vms | length > 0

    - name: Launch AWS Linux bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Linux-bootstrap-aws"
        limit: "{{ aws_linux_instances | join(',') }}"
        extra_vars:
          vm_name: "{{ aws_linux_instances | join(',') }}"
          cloud_provider: "aws"
          operating_system: "linux"
        wait: true
      when: aws_linux_instances | length > 0

    - name: Launch AWS Windows bootstrap workflow
      ansible.controller.workflow_launch:
        workflow_template: "Windows-bootstrap-aws"
        limit: "{{ aws_windows_instances | join(',') }}"
        extra_vars:
          vm_name: "{{ aws_windows_instances | join(',') }}"
          cloud_provider: "aws"
          operating_system: "windows"
        wait: true
      when: aws_windows_instances | length > 0