---
- name: Listen for Terraform events
  hosts: all
  execution_strategy: parallel

  sources:
    - name: Listen for Terraform webhook
      eda.builtin.webhook:
        host: 0.0.0.0
        port: 5010

  rules:
    - name: Post Terraform Apply
      condition: event.payload.stage == "post_apply"
      action:
        run_playbook:
          name: playbooks/eda_launch_post_apply.yaml