---
- name: Listen for Terraform events
  hosts: all
  execution_strategy: parallel

  sources:
    - name: Terraform webhook
      eda.builtin.webhook:
        host: 0.0.0.0
        port: 5010

  rules:
    - name: Post Terraform Apply
      condition: event.payload.stage == "post_apply"
      action:
        run_workflow_template:
          name: "linux-bootstrap"
          organization: "Default"
          include_events: false
          job_args:
            limit: "{{ event.payload.vm_name | default('hts001cldans009') }}"
            extra_vars:
              vm_name: "{{ event.payload.vm_name | default('hts001cldans009') }}"
              cloud_provider: "azure"
              operating_system: "linux"