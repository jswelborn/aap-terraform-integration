---
- name: Listen for Terraform events
  hosts: all
  execution_strategy: parallel

  sources:
    - name: Terraform webhook
      eda.builtin.webhook:
        host: 0.0.0.0
        port: 5010

  rules:
    - name: Post Terraform Apply
      condition: event.payload.notifications[0].trigger == "run:completed" and event.payload.notifications[0].run_status == "applied"
      actions:
        - run_job_template:
            name: "Terraform Cloud Post Apply - AWS"
            organization: "HTS SRE"
            job_args:
              extra_vars:
                run_id: "{{ event.payload.run_id }}"
                run_url: "{{ event.payload.run_url }}"
                workspace_id: "{{ event.payload.workspace_id }}"
                workspace_name: "{{ event.payload.workspace_name }}"
                organization_name: "{{ event.payload.organization_name }}"
        - run_job_template:
            name: "Terraform Cloud Post Apply - Azure"
            organization: "HTS SRE"
            job_args:
              extra_vars:
                run_id: "{{ event.payload.run_id }}"
                run_url: "{{ event.payload.run_url }}"
                workspace_id: "{{ event.payload.workspace_id }}"
                workspace_name: "{{ event.payload.workspace_name }}"
                organization_name: "{{ event.payload.organization_name }}"