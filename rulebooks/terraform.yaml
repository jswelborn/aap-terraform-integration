---
- name: Listen for Terraform events
  hosts: all
  execution_strategy: parallel

  sources:
    - name: Terraform webhook
      eda.builtin.webhook:
        host: 0.0.0.0
        port: 5010

  rules:
    - name: Post Terraform Apply
      condition: event.payload.stage == "post_apply"
      action:
        run_job_template:
          name: "Terraform Cloud VM Post Apply"
          organization: "Default"
          job_args:
            extra_vars:
              event_payload: "{{ event.payload }}"